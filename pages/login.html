<section class="page public-login-inline" aria-labelledby="authTitle">
  <header class="public-login-intro">
    <h2 id="authTitle">Anmelden oder registrieren</h2>
    <p id="loginMessage">Google-Anmeldung wird vorbereitet …</p>
  </header>

  <article class="card public-login-main">
    <div id="loginNotice" class="notice" hidden aria-live="polite"></div>
    <div id="googleSignInButton" class="google-signin-slot" aria-label="Mit Google anmelden"></div>
    <div id="registrationSlot" hidden></div>

    <div class="public-login-note">
      <span aria-hidden="true">✓</span>
      <p>Google bestätigt deine Identität. Rollen, Mitgliedschaft und Zugriffsrechte werden anschließend sicher im Portal geprüft.</p>
    </div>
  </article>
</section>
