<header class="topbar">
  <div class="topbar-leading">
    <button id="mobileMenuToggle" class="icon-button mobile-menu-toggle" type="button" aria-label="Menü öffnen">
      <span class="menu-lines" aria-hidden="true"><i></i><i></i><i></i></span>
    </button>
    <div class="mobile-brand" aria-label="Plärrdeifl Portal">
      <img src="./assets/icons/icon-32.png" alt="">
      <span><strong>Plärrdeifl</strong><small id="mobileBrandContext">ÖFFENTLICHER BEREICH</small></span>
    </div>
    <div class="topbar-title">
      <h1 id="routeTitle">Start</h1>
      <p id="routeSubtitle">Öffentlicher Bereich</p>
    </div>
  </div>
  <div class="topbar-actions">
    <span id="connectionStatus" class="status-pill success">Öffentlicher Bereich</span>
    <div id="userSummary" class="user-summary" hidden>
      <span id="userAvatar" class="user-avatar" aria-hidden="true">PD</span>
      <span class="user-summary-copy"><strong id="userSummaryName">Benutzer</strong><small id="userSummaryRole">Rolle</small></span>
    </div>
    <button id="refreshButton" class="icon-button desktop-utility" type="button" title="Ansicht neu laden" aria-label="Ansicht neu laden">↻</button>
    <button id="logoutButton" class="icon-button desktop-utility" type="button" title="Abmelden" aria-label="Abmelden" hidden>↪</button>
  </div>
</header>
