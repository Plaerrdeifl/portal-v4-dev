<header class="topbar">
  <div class="topbar-leading">
    <button id="mobileMenuToggle" class="icon-button mobile-menu-toggle" type="button" aria-label="Menü öffnen">
      <span class="menu-lines" aria-hidden="true"><i></i><i></i><i></i></span>
    </button>
    <div class="mobile-brand" aria-label="Plärrdeifl Portal">
      <img src="./assets/icons/icon-32.png" alt="">
      <span><strong>Plärrdeifl</strong><small id="mobileBrandContext">ÖFFENTLICHER BEREICH</small></span>
    </div>
  </div>
  <div class="topbar-actions">
    <span id="connectionStatus" class="connection-indicator success" data-state="success" aria-live="polite">
      <i aria-hidden="true"></i>
      <span data-status-text>Online</span>
    </span>
    <button
      id="userSummary"
      class="user-summary user-menu-toggle"
      type="button"
      aria-haspopup="dialog"
      aria-expanded="false"
      aria-label="Benutzermenü öffnen"
      hidden
    >
      <span id="userAvatar" class="user-avatar" aria-hidden="true">
        <img id="userAvatarImage" alt="" hidden>
        <span id="userAvatarInitials">PD</span>
      </span>
      <span class="user-summary-copy">
        <strong id="userSummaryName">Benutzer</strong>
        <small id="userSummaryRole">Rolle</small>
      </span>
    </button>
  </div>
</header>
