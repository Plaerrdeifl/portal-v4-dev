name: Deploy V4 DEV to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-v4-dev
  cancel-in-progress: true

jobs:
  build:
    name: Build V4 DEV
    if: github.repository == 'Plaerrdeifl/portal-v4-dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm test

      - name: Build static DEV portal
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Verify deployment output
        shell: bash
        run: |
          test -s dist/index.html
          test -s dist/js/runtime-config.js
          test -s dist/service-worker.js
          test -s dist/manifest.webmanifest

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy V4 DEV
    if: github.repository == 'Plaerrdeifl/portal-v4-dev'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5