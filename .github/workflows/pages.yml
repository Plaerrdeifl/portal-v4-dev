name: Deploy portal to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Prüfen und Pages-Artefakt erstellen
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Core-Vertragstests
        run: npm test

      - name: Statische Prüfung
        run: npm run check:static

      - name: JavaScript-Syntax prüfen
        run: find js scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Öffentliche Supabase-Runtime erzeugen
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          SUPABASE_URL: ${{ vars.PORTAL_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.PORTAL_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/write-runtime-config.mjs --environment PROD

      - name: Service-Role-Leak verhindern
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          if grep -Eiq 'service[_-]?role' js/runtime-config.js; then
            echo 'Unzulässiger Service-Role-Wert in Runtime-Konfiguration.'
            exit 1
          fi

      - name: GitHub Pages konfigurieren
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Pages-Artefakt erstellen
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

  deploy:
    name: GitHub Pages veröffentlichen
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages-Artefakt veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
