<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b4f9c">
  <title>Plärrdeifl Portal – Offline</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef3fb;color:#17233a;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px}.card{max-width:520px;background:#fff;border-radius:28px;padding:32px;box-shadow:0 18px 50px rgba(24,50,89,.14);text-align:center}.card img{width:112px;height:112px;border-radius:25%}.card h1{font-size:1.65rem;margin:18px 0 10px}.card p{line-height:1.55;color:#526078}.card button{border:0;border-radius:14px;background:#0b4f9c;color:#fff;padding:13px 18px;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <section class="card">
    <img src="./assets/icons/icon-192.png" alt="Plärrdeifl Logo">
    <h1>Gerade keine Verbindung</h1>
    <p>Die Portaloberfläche ist installiert. Für aktuelle Vereinsdaten wird jedoch eine Internetverbindung benötigt.</p>
    <button type="button" onclick="location.reload()">Erneut versuchen</button>
  </section>
</body>
</html>
