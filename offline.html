<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b4f9c">
  <title>Plärrdeifl Portal – Offline</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;background:linear-gradient(155deg,#eef5ff,#dfe9f7);color:#17233a;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px}.card{max-width:520px;background:#fff;border-radius:28px;padding:32px;box-shadow:0 18px 50px rgba(24,50,89,.14);text-align:center}.card img{width:112px;height:112px;border-radius:25%}.eyebrow{display:inline-flex;margin-top:18px;border-radius:999px;background:#fff3d6;color:#8a5200;padding:7px 11px;font-weight:850}.card h1{font-size:1.65rem;margin:14px 0 10px}.card p{line-height:1.55;color:#526078}.card button{border:0;border-radius:14px;background:#0b4f9c;color:#fff;padding:13px 18px;font-weight:800;cursor:pointer;min-height:48px}
  </style>
</head>
<body>
  <section class="card" role="status">
    <img src="./assets/icons/icon-192.png" alt="Plärrdeifl Logo">
    <span class="eyebrow">Offline</span>
    <h1>Gerade keine Verbindung</h1>
    <p>Die Portaloberfläche ist installiert. Für aktuelle Vereinsdaten wird eine Internetverbindung benötigt. Deine gespeicherte Anmeldung wird nicht gelöscht.</p>
    <button type="button" onclick="location.reload()">Erneut verbinden</button>
  </section>
</body>
</html>
