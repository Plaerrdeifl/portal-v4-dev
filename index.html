<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b4f9c">
  <meta name="color-scheme" content="light">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Plärrdeifl Portal – sichere PWA für Fanclub, Teams und Fanbusse.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-src https://script.google.com https://script.googleusercontent.com https://*.googleusercontent.com https://accounts.google.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' https://accounts.google.com/gsi/client; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://*.googleusercontent.com https://accounts.google.com; worker-src 'self'; manifest-src 'self'; form-action 'self' https://accounts.google.com; upgrade-insecure-requests">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Plärrdeifl">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/icon-32.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/mobile.css">
  <title>Plärrdeifl Portal</title>
</head>
<body>
  <noscript>
    <div class="noscript">Für das Plärrdeifl Portal muss JavaScript aktiviert sein.</div>
  </noscript>

  <div id="appSplash" class="app-splash" aria-live="polite">
    <img src="./assets/icons/icon-512.png" alt="Schweinfurter Plärrdeifl Logo">
    <strong>APP wird geladen</strong>
    <div class="splash-loading-dots" aria-label="Wird geladen">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div id="appShell" class="app-shell" hidden>
    <div id="sidebarSlot"></div>
    <div class="app-main">
      <div id="topbarSlot"></div>
      <main id="view" class="view" tabindex="-1" aria-live="polite"></main>
      <footer class="app-footer">
        <span>Plärrdeifl Portal</span>
        <span id="buildLabel">v3.0.0 PWA FINAL</span>
      </footer>
    </div>
  </div>

  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div id="updateBanner" class="install-banner" hidden>
    <div><strong>Neue Portalversion verfügbar</strong><span>Die Aktualisierung wird erst nach deiner Bestätigung übernommen.</span></div>
    <button id="updateButton" class="button primary" type="button">Jetzt aktualisieren</button>
    <button id="updateDismiss" class="icon-button" type="button" aria-label="Später aktualisieren">×</button>
  </div>

  <script type="module" src="./js/app.js?v=20260714-r71-performance-r1"></script>
</body>
</html>
