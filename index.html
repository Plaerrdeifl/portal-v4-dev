<!doctype html>
<html lang="de" data-startup-state="starting">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#041c33">
  <meta name="color-scheme" content="light">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Plärrdeifl Portal – sichere PWA für Fanclub, Teams und Fanbusse.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-src https://script.google.com https://script.googleusercontent.com https://*.googleusercontent.com https://accounts.google.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://accounts.google.com; script-src 'self' https://accounts.google.com/gsi/client; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://*.googleusercontent.com https://accounts.google.com; worker-src 'self'; manifest-src 'self'; form-action 'self' https://accounts.google.com; upgrade-insecure-requests">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Plärrdeifl">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/icon-180.png">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/icon-32.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
  <link rel="stylesheet" href="./css/tokens.css?v=20260716-r71-m4-uiux-p3">
  <link rel="stylesheet" href="./css/layout.css?v=20260716-r71-m4-uiux-p3">
  <link rel="stylesheet" href="./css/components.css?v=20260716-r71-m4-uiux-p3">
  <link rel="stylesheet" href="./css/mobile.css?v=20260716-r71-m4-uiux-p3">
  <link rel="stylesheet" href="./css/uiux-p1.css?v=20260716-r71-m4-uiux-p3">
  <link rel="stylesheet" href="./css/uiux-p2.css?v=20260716-r71-m4-uiux-p3">
  <link rel="stylesheet" href="./css/uiux-p3.css?v=20260716-r71-m4-uiux-p3">
  <title>Plärrdeifl Portal</title>
</head>
<body>
  <noscript>
    <div class="noscript">Für das Plärrdeifl Portal muss JavaScript aktiviert sein.</div>
  </noscript>

  <div id="appSplash" class="app-splash" aria-live="polite" aria-busy="true">
    <div class="splash-logo-shell"><img src="./assets/icons/icon-512.png" alt="Schweinfurter Plärrdeifl Logo"></div>
    <div class="splash-wordmark" aria-label="Plärrdeifl Portal"><strong>Plärrdeifl</strong><span>PORTAL</span></div>
    <div class="splash-loading-dots" aria-label="Wird geladen">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="splash-status" role="status">
      <span id="splashStatus">Portal wird vorbereitet …</span>
      <small id="splashDetail">Sichere App-Oberfläche wird geladen.</small>
      <button id="splashReloadButton" class="splash-reload" type="button" hidden>Verbindung neu starten</button>
    </div>
  </div>

  <div id="appShell" class="app-shell" hidden>
    <div id="sidebarSlot"></div>
    <div class="app-main">
      <div id="topbarSlot"></div>
      <main id="view" class="view" tabindex="-1" aria-live="polite"></main>
      <footer class="app-footer">
        <span>Plärrdeifl Portal</span>
        <span id="buildLabel">v3.0.0 · R7.1 M4</span>
      </footer>
    </div>
  </div>

  <nav id="mobileNav" class="mobile-bottom-nav" aria-label="Mobile Hauptnavigation" hidden></nav>
  <div id="mobileMoreBackdrop" class="mobile-more-backdrop" data-close-more hidden></div>
  <section id="mobileMorePanel" class="mobile-more-panel" aria-label="Weitere Bereiche" aria-modal="true" role="dialog" hidden>
    <div class="mobile-more-handle" aria-hidden="true"></div>
    <header><div><strong>Weitere Bereiche</strong><span>Portalnavigation und Konto</span></div><button class="icon-button" type="button" data-close-more aria-label="Weitere Bereiche schließen">×</button></header>
    <div id="mobileMoreRoutes" class="mobile-more-routes"></div>
    <div class="mobile-more-actions">
      <button id="mobileRefreshButton" class="mobile-more-action" type="button">Ansicht neu laden</button>
      <button id="mobileLogoutButton" class="mobile-more-action danger" type="button">Abmelden</button>
    </div>
  </section>

  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div id="updateBanner" class="install-banner" hidden>
    <div><strong>Neue Portalversion verfügbar</strong><span>Die Aktualisierung wird erst nach deiner Bestätigung übernommen.</span></div>
    <button id="updateButton" class="button primary" type="button">Jetzt aktualisieren</button>
    <button id="updateDismiss" class="icon-button" type="button" aria-label="Später aktualisieren">×</button>
  </div>

  <script type="module" src="./js/app.js?v=20260716-r71-m4-corr1-login"></script>
</body>
</html>
