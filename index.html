<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b4f9c">
  <meta name="color-scheme" content="light">
  <meta name="description" content="Plärrdeifl Portal – sichere PWA für Fanclub, Teams und Fanbusse.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-src https://script.google.com https://script.googleusercontent.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; worker-src 'self'; manifest-src 'self'; form-action 'self' https://accounts.google.com; upgrade-insecure-requests">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Plärrdeifl">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/icon-32.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/mobile.css">
  <title>Plärrdeifl Portal</title>
</head>
<body>
  <noscript>
    <div class="noscript">Für das Plärrdeifl Portal muss JavaScript aktiviert sein.</div>
  </noscript>

  <div id="appSplash" class="app-splash" aria-live="polite">
    <img src="./assets/icons/icon-192.png" alt="" width="112" height="112">
    <strong>Plärrdeifl Portal</strong>
    <span>Login und Backend werden geprüft …</span>
  </div>

  <div id="appShell" class="app-shell" hidden>
    <div id="sidebarSlot"></div>
    <div class="app-main">
      <div id="topbarSlot"></div>
      <main id="view" class="view" tabindex="-1" aria-live="polite"></main>
      <footer class="app-footer">
        <span>Plärrdeifl Portal</span>
        <span id="buildLabel">Phase 2</span>
      </footer>
    </div>
  </div>

  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div id="installBanner" class="install-banner" hidden>
    <div>
      <strong>Portal installieren</strong>
      <span>Lege das Portal mit dem richtigen Plärrdeifl-Icon auf deinem Startbildschirm ab.</span>
    </div>
    <button id="installButton" class="button primary" type="button">Installieren</button>
    <button id="installDismiss" class="icon-button" type="button" aria-label="Hinweis schließen">×</button>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
